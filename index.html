<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Avgångstavla</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#FFD600;
  --border:#FFD600;
  --metro:#D71920;
  --bus:#1E88E5;
}

body.light{
  --bg:#f5f5f5;
  --text:#111;
  --border:#111;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Roboto Mono', monospace;
}

.board{
  max-width:800px;
  margin:20px auto;
  padding:20px;
  border:3px solid var(--border);
  border-radius:20px;
}

.section{
  margin-bottom:40px;
}

.title-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid var(--border);
  margin-bottom:6px;
}

.title, .clock{
  font-size:22px;
  font-weight:600;
}

.columns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.sub{
  font-size:13px;
  margin-bottom:6px;
  text-transform:uppercase;
}

.row{
  display:grid;
  grid-template-columns:50px 1fr 80px;
  align-items:center;
  padding:2px 0;
}

.dest{
  font-size:15px;
}

.time{
  display:flex;
  justify-content:flex-end;
  align-items:baseline;
  gap:6px;
  font-size:20px;
  font-weight:600;
}

.clock-small{
  font-size:12px;
  opacity:0.6;
  min-width:45px;
  text-align:right;
}

.badge{
  padding:3px 5px;
  border-radius:3px;
  color:#fff;
  font-size:14px;
  text-align:center;
}

.metro{ background:var(--metro); }
.bus{ background:var(--bus); }

.now{
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0;}
}

.clock{
  display:flex;
  align-items:baseline;
  gap:2px; /* 🔥 justera detta */
  letter-spacing: -1px; /* tajtar ytterligare */
  font-variant-numeric: tabular-nums;
}

.colon{
  animation: blink 1s steps(1) infinite;
  margin: 0 -1px; /* drar ihop ännu mer */
}

@keyframes blink{
  50% { opacity: 0; }
}

#clock-hours,
#clock-minutes {
  min-width: 28px;
  text-align: right;
}

</style>
</head>

<body>

<div class="board">

  <!-- 🚇 -->
  <div class="section">
    <div class="title-row">
      <div class="title">TUNNELBANA GÄRDET</div>
      <div class="clock">
        <span id="clock-hours"></span>
        <span class="colon">:</span>
        <span id="clock-minutes"></span>
      </div>
    </div>
    <div class="columns">
      <div id="metro-left"></div>
      <div id="metro-right"></div>
    </div>
  </div>

  <!-- 🚌 76 -->
  <div class="section">
    <div class="title-row">
      <div class="title">BUSS 76 hpl Malmvägen</div>
    </div>
    <div class="columns">
      <div id="bus76-left"></div>
      <div id="bus76-right"></div>
    </div>
  </div>

  <!-- 🚌 1 -->
  <div class="section">
    <div class="title-row">
      <div class="title">BUSS 1 hpl Gärdet</div>
    </div>
    <div class="columns">
      <div id="bus1-left"></div>
      <div id="bus1-right"></div>
    </div>
  </div>

</div>

<script>
const API = "https://bitter-lab-3d97.staffan-420.workers.dev";

/* THEME */
const params = new URLSearchParams(location.search);
if(params.get("theme")==="light") document.body.classList.add("light");

document.addEventListener("keydown", e=>{
  if(e.key.toLowerCase()==="o") document.body.classList.toggle("light");
});

/* CLOCK */
function updateClock(){
  const now = new Date();

  const h = String(now.getHours()).padStart(2, "0");
  const m = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("clock-hours").innerText = h;
  document.getElementById("clock-minutes").innerText = m;
}
setInterval(updateClock,1000);
updateClock();

/* GET MINUTES */
function getMinutes(t){
  if(!t) return 999;
  t=t.toLowerCase();

  if(t.includes("nu")) return 0;
  if(t.includes("min")) return parseInt(t);

  if(t.includes(":")){
    const now=new Date();
    const [h,m]=t.split(":").map(Number);
    const dep=new Date();
    dep.setHours(h,m,0,0);

    let diff=(dep-now)/60000;
    if(diff<0) diff+=1440;
    return diff;
  }
  return 999;
}

/* GET CLOCK TIME */
function getClockTime(d){
  // 🔥 testa alla vanliga fält
  const possible =
    d.expectedDateTime ||
    d.scheduledDateTime ||
    d.estimatedDateTime ||
    d.aimedDepartureTime ||
    d.time;

  if(possible){
    const date = new Date(possible);
    if(!isNaN(date)){
      return date.toLocaleTimeString("sv-SE", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }
  }

  // fallback: om display råkar vara HH:MM
  if(d.display && d.display.includes(":")){
    return d.display;
  }

  return "";
}

/* FORMAT TIME */
function formatTime(d){
  const t = d.display || "";
  const minutes = getMinutes(t);

  // Nu
  if(t.toLowerCase().includes("nu")){
    return `<span class="now">Nu</span>`;
  }

  // minuter finns
  if(t.includes("min")){
    if(minutes < 10){
      return `<span>${minutes}</span>`;
    }

    const now = new Date();
    now.setMinutes(now.getMinutes() + minutes);

    const clock = now.toLocaleTimeString("sv-SE", {
      hour: "2-digit",
      minute: "2-digit"
    });

    return `
      <span class="clock-small">${clock}</span>
      <span>${minutes}</span>
    `;
  }

  // 🔥 ENDAST klockslag → samma stil som minuter
  if(t.includes(":")){
    return `<span>${t}</span>`;
  }

  return "";
}

/* GROUP */
function groupByDirection(list, line){
  const filtered = list.filter(x => x.line?.designation == line);

  const groups = {};
  filtered.forEach(d=>{
    const key = d.destination || "okänd";
    if(!groups[key]) groups[key]=[];
    groups[key].push(d);
  });

  return Object.values(groups)
    .map(g => g.sort((a,b)=>getMinutes(a.display)-getMinutes(b.display)))
    .sort((a,b)=>getMinutes(a[0].display)-getMinutes(b[0].display))
    .slice(0,2);
}

/* RENDER */
function renderGrouped(list, leftId, rightId, line, type){
  const groups = groupByDirection(list, line);

  const left = document.getElementById(leftId);
  const right = document.getElementById(rightId);

  left.innerHTML="";
  right.innerHTML="";

  [left,right].forEach((col,i)=>{
    const g = groups[i];
    if(!g) return;

    const dest = g[0].destination;

    col.innerHTML += `<div class="sub">Mot ${dest}</div>`;

    g.slice(0,5).forEach(d=>{
      col.innerHTML += `
        <div class="row">
          <div><span class="badge ${type}">${d.line.designation}</span></div>
          <div class="dest">${dest}</div>
          <div class="time">${formatTime(d)}</div>
        </div>
      `;
    });
  });
}

/* LOAD */
async function load(){
  const res = await fetch(API);
  const data = await res.json();

  renderGrouped(data.metro,"metro-left","metro-right","13","metro");
  renderGrouped(data.bus76,"bus76-left","bus76-right","76","bus");
  renderGrouped(data.bus1,"bus1-left","bus1-right","1","bus");
}

load();
setInterval(load,30000);
</script>

</body>
</html>
