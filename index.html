<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avgångstavla</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#FFD600;
  --metro:#D71920;   /* SL röd */
  --bus:#1E88E5;     /* SL blå-ish */
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Roboto Mono', monospace;
}

/* HEADER BAR (som SL) */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  border-bottom:2px solid var(--text);
  font-size:18px;
}

.clock{
  opacity:0.9;
}

/* BOARD */
.board{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.section{
  margin-bottom:50px;
}

/* TITLAR */
.title{
  font-size:26px;
  font-weight:600;
  margin-bottom:10px;
  border-bottom:3px solid var(--text);
  padding-bottom:5px;
  letter-spacing:1px;
}

/* GRID */
.columns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.sub{
  font-size:14px;
  opacity:0.8;
  margin-bottom:8px;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:60px 1fr 60px;
  align-items:center;
  font-size:20px;
  padding:5px 0;
}

/* BADGES */
.badge{
  display:inline-block;
  padding:4px 6px;
  border-radius:4px;
  color:#fff;
  font-weight:600;
  text-align:center;
}

.metro{ background:var(--metro); }
.bus{ background:var(--bus); }

/* TIME */
.time{
  text-align:right;
}

/* BLINK */
.now{
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0;}
}

/* FULLSCREEN */
.fullscreen-btn{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#222;
  color:#fff;
  border:none;
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <div>AVGÅNGAR</div>
  <div class="clock" id="clock"></div>
</div>

<div class="board">

  <!-- 🚇 -->
  <div class="section">
    <div class="title">TUNNELBANA GÄRDET</div>

    <div class="columns">
      <div>
        <div class="sub">Mot Ropsten</div>
        <div id="metro-ropsten"></div>
      </div>

      <div>
        <div class="sub">Mot Norsborg</div>
        <div id="metro-norsborg"></div>
      </div>
    </div>
  </div>

  <!-- 🚌 -->
  <div class="section">
    <div class="title">BUSS 76 hpl Malmvägen</div>

    <div class="columns">
      <div>
        <div class="sub">Mot Ropsten</div>
        <div id="bus-ropsten"></div>
      </div>

      <div>
        <div class="sub">Mot Norra Hammarbyhamnen</div>
        <div id="bus-hammarby"></div>
      </div>
    </div>
  </div>

</div>

<button class="fullscreen-btn" onclick="goFull()">⛶</button>

<script>
// 🔥 BYT till din Worker
const API = "https://bitter-lab-3d97.staffan-420.workers.dev";

/* CLOCK */
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("sv-SE", {hour:"2-digit", minute:"2-digit"});
}
setInterval(updateClock, 1000);
updateClock();

/* TIME FORMAT */
function formatTime(t){
  if(!t) return "";
  if(t.toLowerCase().includes("nu")) return '<span class="now">Nu</span>';
  return t.replace(" min","");
}

/* RENDER */
function renderColumn(list, containerId, filterFn, type){
  const el = document.getElementById(containerId);
  el.innerHTML = "";

  list
    .filter(filterFn)
    .slice(0,5)
    .forEach(d=>{
      const line = d.line?.designation || "";
      const dest = "Mot " + (d.destination || "");
      const time = d.display || "";

      el.innerHTML += `
        <div class="row">
          <div><span class="badge ${type}">${line}</span></div>
          <div>${dest}</div>
          <div class="time">${formatTime(time)}</div>
        </div>
      `;
    });
}

/* LOAD */
async function load(){
  const res = await fetch(API);
  const data = await res.json();

  // 🚇
  renderColumn(data.metro,"metro-ropsten",
    x=>x.line?.designation=="13" && x.destination.includes("Ropsten"),
    "metro");

  renderColumn(data.metro,"metro-norsborg",
    x=>x.line?.designation=="13" && x.destination.includes("Norsborg"),
    "metro");

  // 🚌
  renderColumn(data.bus,"bus-ropsten",
    x=>x.line?.designation=="76" && x.destination.includes("Ropsten"),
    "bus");

  renderColumn(data.bus,"bus-hammarby",
    x=>x.line?.designation=="76" && x.destination.includes("Hammarby"),
    "bus");
}

load();
setInterval(load,30000);

/* FULLSCREEN */
function goFull(){
  document.documentElement.requestFullscreen();
}
</script>

</body>
</html>
